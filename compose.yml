services:
  postgres:
    image: postgres:17
    restart: always
    container_name: postgres_db
    healthcheck: 
      test: [ "CMD-SHELL", "pg_isready -U  ${POSTGRES_USER} -d ${NAME_DB}" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${NAME_DB}
    ports:
      - "5432:5432"
    networks:
      - pg_network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: ${REDIS_HOST}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["redis-server", "--port", "${REDIS_PORT}", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - redis_network
    volumes:
      - redis_data:/data
  app:
    container_name: geoorg_app
    build:
      context: .
      dockerfile: dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started 
    restart: always
    ports: 
      - "8000:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NAME_DB: ${NAME_DB}
      HOST_DB: ${HOST_DB}
      PORT_DB: ${PORT_DB}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}

    networks:
      - redis_network
      - pg_network

volumes:
  postgres_data:
  redis_data:

networks:
  pg_network:
  redis_network: